<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Verificador de Pedidos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg: #14171c;
    --panel: #1c2129;
    --panel-2: #232a34;
    --line: #2c3440;
    --text: #eef1f5;
    --text-dim: #8a94a3;
    --accent: #f5a623;
    --accent-dim: #7a5518;
    --ok: #34c471;
    --ok-dim: #143823;
    --err: #ef4a52;
    --err-dim: #3a1418;
    --warn: #f5c518;
    --mono: 'SF Mono', 'Consolas', 'Menlo', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1100px; margin:0 auto; padding:20px 16px 60px;}

  /* ---------- TOP BAR ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 4px 20px; border-bottom:1px solid var(--line); margin-bottom:22px;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);}
  .brand b{font-size:16px; letter-spacing:.3px;}
  .brand span{color:var(--text-dim); font-size:12.5px;}

  /* ---------- SCREEN: UPLOAD ---------- */
  .drop{
    border:2px dashed var(--line); border-radius:16px; padding:48px 24px;
    text-align:center; cursor:pointer; transition:.15s; background:var(--panel);
  }
  .drop:hover, .drop.drag{border-color:var(--accent); background:var(--panel-2);}
  .drop .icon{font-size:40px; margin-bottom:10px;}
  .drop h2{margin:6px 0 4px; font-size:19px;}
  .drop p{color:var(--text-dim); margin:0; font-size:14px;}
  input[type=file]{display:none;}

  .saved{margin-top:28px;}
  .saved h3{font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim); margin:0 0 10px;}
  .saved-item{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:14px 16px; margin-bottom:8px; cursor:pointer;
  }
  .saved-item:hover{border-color:var(--accent);}
  .saved-item .meta b{display:block; font-size:14.5px;}
  .saved-item .meta span{color:var(--text-dim); font-size:12.5px;}
  .saved-item .pct{font-family:var(--mono); font-size:14px; color:var(--accent);}
  .saved-item .del{color:var(--err); font-size:12px; margin-left:14px; padding:6px 10px;}

  /* ---------- SCREEN: PICKING ---------- */
  .order-head{
    display:flex; justify-content:space-between; align-items:flex-end; gap:20px; margin-bottom:16px; flex-wrap:wrap;
  }
  .order-head h1{font-size:20px; margin:0 0 4px;}
  .order-head .sub{color:var(--text-dim); font-size:13px;}
  .btn{
    border:1px solid var(--line); background:var(--panel-2); color:var(--text);
    padding:10px 16px; border-radius:10px; font-size:13.5px; cursor:pointer;
  }
  .btn:hover{border-color:var(--accent);}
  .btn.primary{background:var(--accent); color:#1a1206; border-color:var(--accent); font-weight:600;}
  .btn.ghost{background:transparent;}

  .progress-bar{height:10px; border-radius:6px; background:var(--panel-2); overflow:hidden; margin:10px 0 4px;}
  .progress-fill{height:100%; background:linear-gradient(90deg,var(--accent),var(--ok)); transition:width .25s;}
  .progress-nums{display:flex; justify-content:space-between; font-size:12.5px; color:var(--text-dim); font-family:var(--mono);}

  .scan-input{
    width:100%; box-sizing:border-box; background:var(--panel); border:2px solid var(--line);
    color:var(--text); padding:14px 16px; border-radius:12px; font-size:20px; font-family:var(--mono);
    letter-spacing:.03em; margin-bottom:14px;
  }
  .scan-input:focus{outline:none; border-color:var(--accent);}
  .scan-label{font-size:12px; color:var(--text-dim); margin:0 0 6px; display:flex; align-items:center; gap:6px;}
  .scan-label .live{width:7px;height:7px;border-radius:50%; background:var(--ok); box-shadow:0 0 0 3px var(--ok-dim);}

  .history{margin-top:6px;}
  .history h3{font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); margin:0 0 8px;}
  .history-item{
    display:flex; align-items:center; gap:10px; padding:8px 10px; border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .history-item .hicon{width:18px; text-align:center; flex-shrink:0;}
  .history-item.ok .hicon{color:var(--ok);}
  .history-item.warn .hicon{color:var(--warn);}
  .history-item.err .hicon{color:var(--err);}
  .history-item .hcode{font-family:var(--mono); color:var(--text-dim); font-size:12px;}
  .history-item .htime{margin-left:auto; font-family:var(--mono); color:var(--text-dim); font-size:11.5px;}

  .feedback{
    border-radius:16px; padding:22px 24px; margin:18px 0 22px; min-height:104px;
    display:flex; align-items:center; gap:18px; border:1px solid var(--line); background:var(--panel);
    transition:.12s;
  }
  .feedback.ok{background:var(--ok-dim); border-color:var(--ok);}
  .feedback.err{background:var(--err-dim); border-color:var(--err);}
  .feedback.warn{background:#3a2e0c; border-color:var(--warn);}
  .feedback.idle{}
  .feedback .icon{font-size:38px; width:52px; text-align:center; flex-shrink:0;}
  .feedback .txt b{display:block; font-size:19px;}
  .feedback .txt span{color:var(--text-dim); font-size:13.5px; font-family:var(--mono);}
  .feedback.ok .txt span, .feedback.err .txt span{color:inherit; opacity:.75;}

  .toolbar{display:flex; gap:10px; margin-bottom:12px; flex-wrap:wrap; align-items:center;}
  .toolbar input[type=text]{
    flex:1; min-width:180px; background:var(--panel); border:1px solid var(--line); color:var(--text);
    padding:10px 14px; border-radius:10px; font-size:14px;
  }
  .filters{display:flex; gap:6px;}
  .filters button{
    background:var(--panel); border:1px solid var(--line); color:var(--text-dim);
    padding:9px 13px; border-radius:9px; font-size:12.5px; cursor:pointer;
  }
  .filters button.on{background:var(--accent); color:#1a1206; border-color:var(--accent); font-weight:600;}

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  thead th{
    text-align:left; color:var(--text-dim); font-weight:600; font-size:11.5px;
    text-transform:uppercase; letter-spacing:.05em; padding:8px 10px; border-bottom:1px solid var(--line);
  }
  tbody tr{border-bottom:1px solid var(--line);}
  tbody tr.row-ok{background:rgba(52,196,113,.06);}
  tbody tr.row-flash{background:rgba(52,196,113,.22);}
  td{padding:10px; vertical-align:middle;}
  td.code{font-family:var(--mono); font-size:12.5px; color:var(--text-dim);}
  td.desc{max-width:280px;}
  .qty-ctrl{display:flex; align-items:center; gap:8px; font-family:var(--mono);}
  .qty-ctrl button{
    width:26px; height:26px; border-radius:7px; border:1px solid var(--line); background:var(--panel-2);
    color:var(--text); cursor:pointer; font-size:14px; line-height:1;
  }
  .qty-ctrl button:disabled{opacity:.3; cursor:not-allowed;}
  .qty-ctrl .num.at-limit{color:var(--ok);}
  .qty-ctrl .num{min-width:52px; text-align:center; font-size:14px;}
  .badge{
    display:inline-block; padding:4px 10px; border-radius:20px; font-size:11.5px; font-weight:600;
  }
  .badge.pend{background:var(--panel-2); color:var(--text-dim);}
  .badge.part{background:rgba(245,166,35,.15); color:var(--accent);}
  .badge.comp{background:rgba(52,196,113,.15); color:var(--ok);}
  .badge.nobar{background:rgba(239,74,82,.13); color:var(--err); margin-top:4px;}

  .empty{text-align:center; padding:40px; color:var(--text-dim); font-size:14px;}

  .summary-modal{
    position:fixed; inset:0; background:rgba(10,12,15,.75); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;
  }
  .summary-box{
    background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:28px; max-width:480px; width:100%;
  }
  .summary-box h2{margin:0 0 4px;}
  .summary-box p{color:var(--text-dim); font-size:13.5px; margin:0 0 20px;}
  .summary-stat{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line); font-size:14px;}
  .summary-stat b{font-family:var(--mono);}
  .summary-actions{display:flex; gap:10px; margin-top:22px;}

  .hint{font-size:12px; color:var(--text-dim); margin-top:2px;}
  @media (max-width:640px){
    .order-head{flex-direction:column; align-items:flex-start;}
    td.desc{max-width:140px; font-size:12.5px;}
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const STORAGE_PREFIX = 'pedido:';
let state = {
  screen: 'upload',      // upload | picking
  fileName: '',
  storageKey: '',
  items: [],              // {codigo, desc, cantidad, escaneado, ubicacion}
  lastScan: null,          // {type:'ok'|'err', codigo, desc, ts}
  scanHistory: [],         // recent scans, newest first
  filter: 'all',           // all | pend | comp
  search: '',
  savedOrders: []
};

const app = document.getElementById('app');

// ---------------- SOUND ----------------
function beep(ok){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.value = ok ? 880 : 220;
    g.gain.value = 0.15;
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (ok?0.15:0.35));
    o.stop(ctx.currentTime + (ok?0.16:0.36));
    if(!ok){
      setTimeout(()=>{
        const ctx2 = new (window.AudioContext||window.webkitAudioContext)();
        const o2 = ctx2.createOscillator(); const g2 = ctx2.createGain();
        o2.connect(g2); g2.connect(ctx2.destination);
        o2.type='sine'; o2.frequency.value=220; g2.gain.value=0.15;
        o2.start(); g2.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime+0.2);
        o2.stop(ctx2.currentTime+0.22);
      }, 180);
    }
  }catch(e){}
}

// ---------------- STORAGE ----------------
async function listSavedOrders(){
  try{
    const res = await window.storage.list(STORAGE_PREFIX, false);
    if(!res || !res.keys) return [];
    const out = [];
    for(const k of res.keys){
      try{
        const r = await window.storage.get(k, false);
        if(r && r.value) out.push(JSON.parse(r.value));
      }catch(e){}
    }
    out.sort((a,b)=> (b.updatedAt||0) - (a.updatedAt||0));
    return out;
  }catch(e){ return []; }
}
async function saveOrder(){
  if(!state.storageKey) return;
  const payload = {
    key: state.storageKey,
    fileName: state.fileName,
    items: state.items,
    updatedAt: Date.now()
  };
  try{ await window.storage.set(state.storageKey, JSON.stringify(payload), false); }catch(e){}
}
async function deleteOrder(key){
  try{ await window.storage.delete(key, false); }catch(e){}
}

// ---------------- EXCEL PARSING ----------------
function normalizeHeader(h){
  return String(h||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}
function findCol(headers, candidates){
  for(let i=0;i<headers.length;i++){
    const h = normalizeHeader(headers[i]);
    if(candidates.some(c => h.includes(c))) return i;
  }
  return -1;
}
function parseWorkbook(wb){
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, {header:1, raw:true, defval:''});
  if(rows.length < 2) throw new Error('El archivo no tiene datos.');
  const headers = rows[0];
  const idxCodigo = findCol(headers, ['numero de articulo','codigo de articulo','articulo','sku','codigo']);
  const idxDesc = findCol(headers, ['descripcion']);
  const idxBarras = findCol(headers, ['codigo de barras','barras','ean','upc']);
  const idxCant = findCol(headers, ['cantidad a preparar','cantidad']);
  const idxUbic = findCol(headers, ['ubicacion']);
  if(idxBarras === -1) throw new Error('No se encontró la columna "Código de barras".');
  if(idxCant === -1) throw new Error('No se encontró la columna "Cantidad".');

  const items = [];
  for(let r=1;r<rows.length;r++){
    const row = rows[r];
    if(!row || row.every(c=>c==='' || c==null)) continue;
    const barras = String(row[idxBarras]!==undefined? row[idxBarras]:'').trim();
    const cantidad = Number(row[idxCant]) || 0;
    items.push({
      codigo: idxCodigo!==-1 ? String(row[idxCodigo]||'').trim() : '',
      desc: idxDesc!==-1 ? String(row[idxDesc]||'').trim() : '',
      barras: barras,
      ubicacion: idxUbic!==-1 ? String(row[idxUbic]||'').trim() : '',
      cantidad: cantidad,
      escaneado: 0
    });
  }
  if(items.length===0) throw new Error('No se pudo leer ningún producto del archivo.');
  return items;
}

function normalizeBarcode(s){
  return String(s||'').replace(/\D/g,'').replace(/^0+/,'');
}

function matchItem(scanned){
  const norm = normalizeBarcode(scanned);
  if(!norm) return undefined;
  return state.items.find(it => it.barras && normalizeBarcode(it.barras) === norm);
}

// ---------------- RENDER: UPLOAD ----------------
async function renderUpload(){
  state.savedOrders = await listSavedOrders();
  app.innerHTML = `
    <div class="topbar">
      <div class="brand"><div class="dot"></div><b>Verificador de Pedidos</b><span>&nbsp;· preparación con lector de código de barras</span></div>
    </div>
    <div class="drop" id="dropZone">
      <div class="icon">📦</div>
      <h2>Cargar pedido de preparación</h2>
      <p>Arrastrá el archivo Excel del pedido acá, o hacé clic para elegirlo</p>
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
    </div>
    <div class="saved" id="savedWrap"></div>
  `;
  const drop = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  drop.onclick = ()=> fileInput.click();
  drop.ondragover = e => { e.preventDefault(); drop.classList.add('drag'); };
  drop.ondragleave = ()=> drop.classList.remove('drag');
  drop.ondrop = e => {
    e.preventDefault(); drop.classList.remove('drag');
    if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  };
  fileInput.onchange = e => { if(e.target.files[0]) handleFile(e.target.files[0]); };

  const savedWrap = document.getElementById('savedWrap');
  if(state.savedOrders.length){
    savedWrap.innerHTML = `<h3>Pedidos en curso</h3>` + state.savedOrders.map(o=>{
      const total = o.items.reduce((a,it)=>a+it.cantidad,0);
      const done = o.items.reduce((a,it)=>a+Math.min(it.escaneado,it.cantidad),0);
      const pct = total? Math.round(done/total*100):0;
      const d = new Date(o.updatedAt);
      return `<div class="saved-item" data-key="${o.key}">
        <div class="meta"><b>${escapeHtml(o.fileName)}</b><span>${o.items.length} productos · actualizado ${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span></div>
        <div style="display:flex;align-items:center;">
          <span class="pct">${pct}%</span>
          <span class="del" data-del="${o.key}">Eliminar</span>
        </div>
      </div>`;
    }).join('');
    savedWrap.querySelectorAll('.saved-item').forEach(el=>{
      el.onclick = async (ev)=>{
        if(ev.target.dataset.del) return;
        const key = el.dataset.key;
        const found = state.savedOrders.find(o=>o.key===key);
        if(found){
          state.storageKey = found.key;
          state.fileName = found.fileName;
          state.items = found.items;
          state.screen = 'picking';
          state.lastScan = null;
          state.scanHistory = [];
          render();
        }
      };
    });
    savedWrap.querySelectorAll('[data-del]').forEach(el=>{
      el.onclick = async (ev)=>{
        ev.stopPropagation();
        await deleteOrder(el.dataset.del);
        renderUpload();
      };
    });
  }
}

function handleFile(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const items = parseWorkbook(wb);
      state.items = items;
      state.fileName = file.name;
      state.storageKey = STORAGE_PREFIX + file.name.replace(/[^a-zA-Z0-9._-]/g,'_') + '_' + Date.now();
      state.screen = 'picking';
      state.lastScan = null;
      state.scanHistory = [];
      saveOrder();
      render();
    }catch(err){
      alert('No se pudo leer el archivo: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ---------------- RENDER: PICKING ----------------
function itemStatus(it){
  if(it.escaneado <= 0) return 'pend';
  if(it.escaneado < it.cantidad) return 'part';
  return 'comp';
}

function renderPicking(){
  const scrollY = window.scrollY;
  const totalUnits = state.items.reduce((a,it)=>a+it.cantidad,0);
  const doneUnits = state.items.reduce((a,it)=>a+Math.min(it.escaneado,it.cantidad),0);
  const totalLines = state.items.length;
  const doneLines = state.items.filter(it=>itemStatus(it)==='comp').length;
  const pct = totalUnits? Math.round(doneUnits/totalUnits*100):0;

  let visibleItems = state.items;
  if(state.filter==='pend') visibleItems = visibleItems.filter(it=>itemStatus(it)!=='comp');
  if(state.filter==='comp') visibleItems = visibleItems.filter(it=>itemStatus(it)==='comp');
  if(state.search.trim()){
    const q = state.search.toLowerCase();
    visibleItems = visibleItems.filter(it=>
      it.codigo.toLowerCase().includes(q) ||
      it.desc.toLowerCase().includes(q) ||
      it.barras.includes(q)
    );
  }

  const fb = state.lastScan;
  let fbHtml;
  if(!fb){
    fbHtml = `<div class="feedback idle"><div class="icon">📡</div><div class="txt"><b>Listo para escanear</b><span>Apuntá el lector al código de barras del producto</span></div></div>`;
  }else if(fb.type==='ok'){
    fbHtml = `<div class="feedback ok"><div class="icon">✅</div><div class="txt"><b>${escapeHtml(fb.desc||fb.codigo)}</b><span>${escapeHtml(fb.codigo)} · escaneado ${fb.escaneado}/${fb.cantidad}</span></div></div>`;
  }else if(fb.type==='warn'){
    fbHtml = `<div class="feedback warn"><div class="icon">⚠️</div><div class="txt"><b>Ya se preparó la cantidad solicitada</b><span>${escapeHtml(fb.desc||fb.codigo)} · ${escapeHtml(fb.codigo)} · ${fb.cantidad}/${fb.cantidad} completo</span></div></div>`;
  }else{
    fbHtml = `<div class="feedback err"><div class="icon">✕</div><div class="txt"><b>Producto no pertenece al pedido</b><span>Código escaneado: ${escapeHtml(fb.codigo)}</span></div></div>`;
  }

  const historyHtml = state.scanHistory.length ? `
    <div class="history">
      <h3>Últimos escaneos</h3>
      ${state.scanHistory.slice(0,8).map(h=>{
        const icon = h.type==='ok' ? '✓' : h.type==='warn' ? '⚠' : '✕';
        const label = h.type==='ok' ? (h.desc||h.codigo) : h.type==='warn' ? `${h.desc||h.codigo} (completo)` : 'No pertenece al pedido';
        const t = new Date(h.ts);
        return `<div class="history-item ${h.type}">
          <span class="hicon">${icon}</span>
          <span>${escapeHtml(label)}</span>
          <span class="hcode">${escapeHtml(h.codigo)}</span>
          <span class="htime">${t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
        </div>`;
      }).join('')}
    </div>` : '';

  app.innerHTML = `
    <div class="topbar">
      <div class="brand"><div class="dot"></div><b>Verificador de Pedidos</b></div>
      <button class="btn ghost" id="btnBack">← Nuevo pedido</button>
    </div>

    <div class="order-head">
      <div>
        <h1>${escapeHtml(state.fileName)}</h1>
        <div class="sub">${totalLines} líneas · ${totalUnits} unidades a preparar</div>
      </div>
      <button class="btn primary" id="btnFinish">Finalizar pedido</button>
    </div>

    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-nums"><span>${doneUnits} / ${totalUnits} unidades</span><span>${doneLines} / ${totalLines} líneas completas</span><span>${pct}%</span></div>

    <div class="scan-label"><span class="live"></span>Escaneá el código de barras acá</div>
    <input type="text" class="scan-input" id="scanInput" autofocus autocomplete="off" placeholder="Esperando lectura del escáner...">

    ${fbHtml}
    ${historyHtml}

    <div class="toolbar">
      <input type="text" id="searchBox" placeholder="Buscar por código o descripción..." value="${escapeHtml(state.search)}">
      <div class="filters">
        <button data-f="all" class="${state.filter==='all'?'on':''}">Todos</button>
        <button data-f="pend" class="${state.filter==='pend'?'on':''}">Pendientes</button>
        <button data-f="comp" class="${state.filter==='comp'?'on':''}">Completos</button>
      </div>
    </div>

    <table>
      <thead><tr>
        <th>Código</th><th>Descripción</th>${state.items.some(i=>i.ubicacion)?'<th>Ubicación</th>':''}<th>Cantidad</th><th>Estado</th>
      </tr></thead>
      <tbody id="tbody">
      ${visibleItems.length ? visibleItems.map(it=>{
        const st = itemStatus(it);
        const idx = state.items.indexOf(it);
        return `<tr class="${st==='comp'?'row-ok':''}" data-idx="${idx}">
          <td class="code">${it.barras ? escapeHtml(it.codigo || it.barras) : `${escapeHtml(it.codigo)}<br><span class="badge nobar">Sin código de barras</span>`}</td>
          <td class="desc">${escapeHtml(it.desc)}</td>
          ${state.items.some(i=>i.ubicacion) ? `<td>${escapeHtml(it.ubicacion)}</td>` : ''}
          <td><div class="qty-ctrl">
            <button data-adj="-1" data-idx="${idx}" ${it.escaneado<=0?'disabled':''}>–</button>
            <span class="num${st==='comp'?' at-limit':''}">${it.escaneado}/${it.cantidad}</span>
            <button data-adj="1" data-idx="${idx}" ${it.escaneado>=it.cantidad?'disabled':''}>+</button>
          </div></td>
          <td><span class="badge ${st}">${st==='pend'?'Pendiente':st==='part'?'Parcial':'Completo'}</span></td>
        </tr>`;
      }).join('') : `<tr><td colspan="5"><div class="empty">No hay productos que coincidan.</div></td></tr>`}
      </tbody>
    </table>
  `;

  document.getElementById('btnBack').onclick = ()=>{ state.screen='upload'; state.lastScan=null; render(); };
  document.getElementById('btnFinish').onclick = showSummary;
  document.getElementById('searchBox').oninput = (e)=>{ state.search = e.target.value; renderPicking(); refocus(); };
  document.querySelectorAll('.filters button').forEach(b=>{
    b.onclick = ()=>{ state.filter = b.dataset.f; renderPicking(); refocus(); };
  });
  document.querySelectorAll('[data-adj]').forEach(b=>{
    b.onclick = ()=>{
      const idx = Number(b.dataset.idx);
      const delta = Number(b.dataset.adj);
      const it = state.items[idx];
      it.escaneado = Math.max(0, Math.min(it.cantidad, it.escaneado + delta));
      saveOrder();
      renderPicking();
      refocus();
    };
  });

  const scanInput = document.getElementById('scanInput');
  scanInput.value = '';
  scanInput.focus({preventScroll:true});
  scanInput.onkeydown = (e)=>{
    if(e.key === 'Enter'){
      const code = scanInput.value.trim();
      scanInput.value = '';
      if(code) handleScan(code);
    }
  };
  document.body.onclick = (e)=>{
    if(e.target && e.target.id === 'searchBox') return;
    refocus();
  };
  window.scrollTo(0, scrollY);
}

function refocus(){
  const el = document.getElementById('scanInput');
  if(el) el.focus({preventScroll:true});
}

function handleScan(code){
  const item = matchItem(code);
  if(!item){
    state.lastScan = {type:'err', codigo: code, ts: Date.now()};
    pushHistory(state.lastScan);
    beep(false);
    renderPicking();
    refocus();
    return;
  }
  if(item.escaneado >= item.cantidad){
    state.lastScan = {
      type:'warn', codigo: item.codigo || item.barras, desc: item.desc,
      cantidad: item.cantidad, ts: Date.now()
    };
    pushHistory(state.lastScan);
    beep(false);
    renderPicking();
    refocus();
    return;
  }
  item.escaneado += 1;
  saveOrder();
  state.lastScan = {
    type:'ok', codigo: item.codigo || item.barras, desc: item.desc,
    escaneado: item.escaneado, cantidad: item.cantidad, ts: Date.now()
  };
  pushHistory(state.lastScan);
  beep(true);
  renderPicking();
  refocus();
  const idx = state.items.indexOf(item);
  const row = document.querySelector(`tr[data-idx="${idx}"]`);
  if(row){
    row.classList.add('row-flash');
    setTimeout(()=>row && row.classList.remove('row-flash'), 350);
  }
}

function pushHistory(entry){
  state.scanHistory.unshift(entry);
  if(state.scanHistory.length > 30) state.scanHistory.length = 30;
}

// ---------------- SUMMARY / EXPORT ----------------
function showSummary(){
  const totalLines = state.items.length;
  const compLines = state.items.filter(it=>itemStatus(it)==='comp').length;
  const partLines = state.items.filter(it=>itemStatus(it)==='part').length;
  const pendLines = state.items.filter(it=>itemStatus(it)==='pend').length;

  const modal = document.createElement('div');
  modal.className = 'summary-modal';
  modal.innerHTML = `
    <div class="summary-box">
      <h2>Resumen del pedido</h2>
      <p>${escapeHtml(state.fileName)}</p>
      <div class="summary-stat"><span>Líneas completas</span><b style="color:var(--ok)">${compLines} / ${totalLines}</b></div>
      <div class="summary-stat"><span>Líneas parciales</span><b style="color:var(--accent)">${partLines}</b></div>
      <div class="summary-stat"><span>Líneas pendientes</span><b style="color:var(--text-dim)">${pendLines}</b></div>
      <div class="summary-actions">
        <button class="btn primary" id="btnExport">Descargar reporte Excel</button>
        <button class="btn ghost" id="btnClose">Cerrar</button>
      </div>
      ${pendLines+partLines>0 ? '<p class="hint" style="margin-top:14px;">Todavía hay líneas sin completar. Podés seguir escaneando después de cerrar este resumen.</p>':''}
    </div>
  `;
  document.body.appendChild(modal);
  document.getElementById('btnClose').onclick = ()=>{ modal.remove(); refocus(); };
  document.getElementById('btnExport').onclick = exportReport;
}

function exportReport(){
  const rows = [['Código','Descripción','Cantidad solicitada','Cantidad preparada','Estado']];
  state.items.forEach(it=>{
    const st = itemStatus(it);
    rows.push([it.codigo||it.barras, it.desc, it.cantidad, it.escaneado, st==='comp'?'Completo':st==='part'?'Parcial':'Pendiente']);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Reporte');
  const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'});
  const blob = new Blob([wbout], {type:'application/octet-stream'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'reporte_' + state.fileName.replace(/\.[^.]+$/,'') + '.xlsx';
  a.click();
  URL.revokeObjectURL(url);
}

function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function render(){
  if(state.screen==='upload') renderUpload();
  else renderPicking();
}
render();
</script>
</body>
